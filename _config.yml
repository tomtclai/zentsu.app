exclude:
  - package.json
  - package-lock.json
  - lefthook.yml
  - scripts/
  - node_modules/
  - README.md
  - tools/_template.html
  # CI: setup-ruby vendors gems into the workspace; Jekyll must not build them
  - vendor/
  - .bundle/
  - Gemfile
  - Gemfile.lock

url: 'https://zentsu.app'
baseurl: ''
title: 'Zentsu'
description: 'Software for Apple platforms, built by Zentsu LLC.'

# ── Pricing: single source of truth ──
# Every price shown anywhere on the site (pricing cards, FAQ prose, the FAQPage
# and SoftwareApplication JSON-LD, tool pages, app cards, meta descriptions)
# renders from these values via Liquid. Change a price here and rebuild. That
# is the only edit required. Values are the numeric amounts only; the "$" and
# currency label live in the templates. Currency is USD. Keep in sync with each
# app's StoreKit configuration.
#
# Per-app prices are keyed so the apps data (_data/apps.yml) can reference them
# via `price_key` without hardcoding a "$" figure. Add a new app's price here,
# then point its apps.yml entry's `price_key` at it (e.g. price_key: price_coil_lifetime).

# Bench: one-time Bench Pro unlock, sold as a non-consumable in-app purchase.
price_lifetime: '14.99'
# The renewal-for-updates SKU is not offered at launch (it does not exist in App
# Store Connect yet), so this value is intentionally not rendered anywhere on the
# site. Kept here so the renewal copy can be restored in one place once it ships.
price_renewal: '9'

# Coil: one-time lifetime purchase (currently TestFlight; not yet on the App Store).
price_coil_lifetime: '14.99'

# Dial: free download with three equivalent Dial Pro purchase options.
price_dial_lifetime: '49.99'
price_dial_annual: '19.99'
price_dial_monthly: '3.99'

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

include:
  - _redirects

# Pretty blog URLs are scoped to posts only. A top-level `permalink` with a
# trailing slash would force every front-matter *page* to a directory URL
# (e.g. /privacy/ instead of /privacy.html) and break existing links.
defaults:
  - scope:
      path: ''
      type: posts
    values:
      permalink: /blog/:year/:slug/
