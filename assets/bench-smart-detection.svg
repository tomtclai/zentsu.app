<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="sd-title sd-desc" font-family="'Inter Tight', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <title id="sd-title">Smart Detection: copied content routes to the right Bench tool</title>
  <desc id="sd-desc">A panel showing four rows. In each row, content copied to the clipboard on the left routes through an arrow to the recognized Bench tool on the right. A JWT routes to JWT Decoder, a JSON snippet to JSON Formatter, a hex color to Color Converter, and a Unix timestamp to Timestamp. Detection runs on the Mac using rule-based checks.</desc>

  <!-- ===== resolved tokens from bench.css (light) =====
       bg #f5f3ee  bg-alt #ecebe4  surface #ffffff  ink #14110f  ink-soft #2a2622
       muted #6b655e  border #d8d4cb  border-soft #e6e2d8
       accent #4a7c6f  accent-soft #e6efec  spot #b84e1a  spot-soft #f1e3d8
       fonts: Inter Tight (UI), JetBrains Mono (code) -->

  <!-- page background -->
  <rect width="1200" height="760" fill="#f5f3ee"/>

  <!-- ===== card / panel (single subtle elevation) ===== -->
  <rect x="40" y="40" width="1120" height="680" rx="16" fill="#ffffff" stroke="#d8d4cb" stroke-width="1.5"/>

  <!-- ===== panel header ===== -->
  <!-- left column header: clipboard glyph + "Copied" -->
  <g transform="translate(72,76)">
    <!-- clipboard glyph -->
    <g stroke="#6b655e" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="0.9" y="3" width="15" height="18" rx="3"/>
      <path d="M5.5 3 V1.6 a1.4 1.4 0 0 1 1.4 -1.4 h3 a1.4 1.4 0 0 1 1.4 1.4 V3 Z" fill="#6b655e" stroke="none"/>
    </g>
    <text x="26" y="17" font-size="15" font-weight="600" letter-spacing="0.06em" fill="#6b655e">COPIED</text>
  </g>

  <!-- right column header: "Bench opens" -->
  <g transform="translate(742,76)">
    <text x="0" y="17" font-size="15" font-weight="600" letter-spacing="0.06em" fill="#6b655e">BENCH OPENS</text>
  </g>

  <!-- header divider -->
  <line x1="72" y1="116" x2="1128" y2="116" stroke="#e6e2d8" stroke-width="1.5"/>

  <!-- ================= ROWS ================= -->
  <!-- Row geometry: clipboard sample box x=72 w=540 ; arrow ~628–700 ; pill x=742 w=386 -->

  <!-- ================= ROW 1 — JWT ================= -->
  <g transform="translate(0,150)">
    <!-- clipboard sample -->
    <rect x="72" y="0" width="540" height="94" rx="10" fill="#f5f3ee" stroke="#e6e2d8" stroke-width="1.5"/>
    <text x="92" y="38" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace" font-size="17" font-weight="500">
      <tspan fill="#4a7c6f">eyJhbGci</tspan><tspan fill="#b84e1a">OiJIUzI1</tspan><tspan fill="#6b655e">NiJ9.eyJ…</tspan>
    </text>
    <!-- segment legend -->
    <g font-family="'JetBrains Mono', monospace" font-size="11.5" font-weight="500">
      <rect x="92" y="56" width="9" height="9" rx="2" fill="#4a7c6f"/>
      <text x="106" y="64.5" fill="#6b655e">header</text>
      <rect x="172" y="56" width="9" height="9" rx="2" fill="#b84e1a"/>
      <text x="186" y="64.5" fill="#6b655e">payload</text>
      <rect x="258" y="56" width="9" height="9" rx="2" fill="#6b655e"/>
      <text x="272" y="64.5" fill="#6b655e">signature</text>
    </g>

    <!-- arrow -->
    <g stroke="#b3ada2" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M636 47 H694"/>
      <path d="M686 40 L696 47 L686 54"/>
    </g>

    <!-- tool pill -->
    <rect x="742" y="20" width="386" height="54" rx="27" fill="#e6efec" stroke="#4a7c6f" stroke-width="1.5"/>
    <circle cx="775" cy="47" r="6.5" fill="#4a7c6f"/>
    <text x="800" y="53" font-size="20" font-weight="600" fill="#14110f">JWT Decoder</text>
  </g>

  <!-- ================= ROW 2 — JSON ================= -->
  <g transform="translate(0,278)">
    <rect x="72" y="0" width="540" height="94" rx="10" fill="#f5f3ee" stroke="#e6e2d8" stroke-width="1.5"/>
    <text x="92" y="56" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace" font-size="17" font-weight="500">
      <tspan fill="#9aa0a6">{</tspan><tspan fill="#4a7c6f">"total"</tspan><tspan fill="#9aa0a6">:</tspan><tspan fill="#b84e1a"> 42.99</tspan><tspan fill="#9aa0a6">, </tspan><tspan fill="#4a7c6f">"tier"</tspan><tspan fill="#9aa0a6">:</tspan><tspan fill="#7a8a5e"> "pro"</tspan><tspan fill="#9aa0a6"> }</tspan>
    </text>

    <g stroke="#b3ada2" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M636 47 H694"/>
      <path d="M686 40 L696 47 L686 54"/>
    </g>

    <rect x="742" y="20" width="386" height="54" rx="27" fill="#e6efec" stroke="#4a7c6f" stroke-width="1.5"/>
    <circle cx="775" cy="47" r="6.5" fill="#4a7c6f"/>
    <text x="800" y="53" font-size="20" font-weight="600" fill="#14110f">JSON Formatter</text>
  </g>

  <!-- ================= ROW 3 — Hex color ================= -->
  <g transform="translate(0,406)">
    <rect x="72" y="0" width="540" height="94" rx="10" fill="#f5f3ee" stroke="#e6e2d8" stroke-width="1.5"/>
    <!-- color swatch of the exact color -->
    <rect x="92" y="32" width="30" height="30" rx="6" fill="#2D7DD2" stroke="#d8d4cb" stroke-width="1"/>
    <text x="136" y="56" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20" font-weight="500" fill="#14110f">#2D7DD2</text>

    <g stroke="#b3ada2" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M636 47 H694"/>
      <path d="M686 40 L696 47 L686 54"/>
    </g>

    <rect x="742" y="20" width="386" height="54" rx="27" fill="#e6efec" stroke="#4a7c6f" stroke-width="1.5"/>
    <circle cx="775" cy="47" r="6.5" fill="#4a7c6f"/>
    <text x="800" y="53" font-size="20" font-weight="600" fill="#14110f">Color Converter</text>
  </g>

  <!-- ================= ROW 4 — Unix timestamp ================= -->
  <g transform="translate(0,534)">
    <rect x="72" y="0" width="540" height="94" rx="10" fill="#f5f3ee" stroke="#e6e2d8" stroke-width="1.5"/>
    <text x="92" y="56" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20" font-weight="500" fill="#14110f">1516239022</text>

    <g stroke="#b3ada2" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M636 47 H694"/>
      <path d="M686 40 L696 47 L686 54"/>
    </g>

    <rect x="742" y="20" width="386" height="54" rx="27" fill="#e6efec" stroke="#4a7c6f" stroke-width="1.5"/>
    <circle cx="775" cy="47" r="6.5" fill="#4a7c6f"/>
    <text x="800" y="53" font-size="20" font-weight="600" fill="#14110f">Timestamp</text>
  </g>

  <!-- footnote: reinforces heuristic, on-device, no AI claim -->
  <text x="72" y="700" font-size="13.5" fill="#6b655e">Rule-based checks run on your Mac. Nothing is sent anywhere.</text>
</svg>
