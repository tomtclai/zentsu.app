<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zentsu LLC</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #f9f9f7;
      --surface: #ffffff;
      --border:  #e5e5e3;
      --text:    #1a1a1a;
      --muted:   #6b6b6b;
      --accent:  #4a7c6f;
      --accent-light: #eaf2f0;
      --body-text: #333333;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Nav ── */
    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
    }
    nav ul {
      list-style: none;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      max-width: 900px;
      margin: 0 auto;
      height: 56px;
    }
    nav a {
      text-decoration: none;
      color: var(--muted);
      font-size: 0.875rem;
      letter-spacing: 0.01em;
      transition: color 0.15s;
    }
    nav a:hover, nav a.active { color: var(--accent); }
    nav li:first-child { margin-right: auto; }
    nav li:first-child a {
      font-weight: 700;
      font-size: 1rem;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    /* ── Hero ── */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4rem 1.5rem;
    }
    .hero {
      text-align: center;
      max-width: 520px;
    }
    .hero h1 {
      font-size: clamp(1.75rem, 5vw, 2.5rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--text);
      margin-bottom: 0.75rem;
    }
    .hero p {
      font-size: 1.0625rem;
      color: var(--muted);
      line-height: 1.6;
    }
    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 0.8125rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }
    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--accent); }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:        #111113;
        --surface:   #1c1c1e;
        --border:    #2c2c2e;
        --text:      #f0f0f0;
        --muted:     #8e8e93;
        --accent:    #5fa896;
        --accent-light: #1e3330;
        --body-text: #d1d1d6;
      }
    }
  </style>
</head>
<body>

  <div id="nav-placeholder"></div>

  <main>
    <div class="hero">
      <h1>Zentsu</h1>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 Zentsu LLC</p>
  </footer>

  <script src="nav.js"></script>
</body>
</html>
