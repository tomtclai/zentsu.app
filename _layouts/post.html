---

<!doctype html>
<html lang="en">
  <head>
    {% include head-common.html seo_managed_externally=true %} {% seo %} {% feed_meta %}
    <meta property="og:image:type" content="image/png" />
    <style>
      main {
        flex: 1;
        padding: 3rem 1.5rem;
      }
      .post-meta {
        font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 0.75rem;
        letter-spacing: 0.04em;
        color: var(--muted);
        margin: 0.5rem 0 2rem;
      }
    </style>
  </head>
  <body>
    {% include nav.html %}
    <main id="main-content" tabindex="-1">
      <article>
        <span class="page-label">Blog</span>
        <h1>{{ page.title }}</h1>
        <p class="post-meta">{{ page.date | date: "%B %-d, %Y" }} · Zentsu</p>
        {{ content }}
      </article>
    </main>
    {% include footer.html %}
  </body>
</html>
