---
---

<!doctype html>
<html lang="en">
  <head>
    {% include head-common.html %}
    <title>{{ page.title }} — Zentsu</title>
    <meta name="description" content="{{ page.description | default: site.description }}" />
    <link rel="canonical" href="{{ page.url | absolute_url }}" />
    <meta property="og:type" content="article" />
    <meta property="og:title" content="{{ page.title }}" />
    <meta property="og:description" content="{{ page.description | default: site.description }}" />
    <meta property="og:url" content="{{ page.url | absolute_url }}" />
    <meta property="og:image" content="https://zentsu.app/assets/bench-icon.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://zentsu.app/assets/bench-icon.png" />
    {% seo %}
  </head>
  <body>
    {% include nav.html %}
    <main style="flex: 1; padding: 3rem 1.5rem; max-width: 720px; margin: 0 auto">
      <article>
        <span class="page-label">Blog</span>
        <h1>{{ page.title }}</h1>
        <p style="color: var(--muted); font-size: 0.875rem">
          {{ page.date | date: "%B %-d, %Y" }} · Zentsu
        </p>
        {{ content }}
      </article>
    </main>
    <footer>
      <div class="footer-links">
        <a href="/bench.html">Bench</a>
        <a href="/privacy.html">Privacy</a>
        <a href="/terms.html">Terms</a>
      </div>
      <p>&copy; {{ site.time | date: '%Y' }} Zentsu LLC</p>
    </footer>
  </body>
</html>
